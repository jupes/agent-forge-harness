# Fixtures for evaluator calibration. See scripts/evals/README.md.
# Each case: `vars` feeds the prompt; `metadata` tells assertions.ts what
# verdict / severity counts to expect.

- description: "PASS — trivial change, everything matches"
  vars:
    task_id: "eval-fixture-pass"
    task_spec: |
      Add a one-line comment to src/utils.ts describing the function purpose.
      Acceptance criteria:
      - Exactly one new line in src/utils.ts.
      - No other files changed.
      - Comment starts with // and ends with a period.
    candidate_output: |
      diff --git a/src/utils.ts b/src/utils.ts
      index 1234567..89abcde 100644
      --- a/src/utils.ts
      +++ b/src/utils.ts
      @@ -1,3 +1,4 @@
      +// Returns the sum of two numbers.
       export function add(a: number, b: number) {
         return a + b;
       }
    fixture_expected: |
      {"verdict":"PASS","blocker":0,"high":0}
  assert: []

- description: "FAIL (BLOCKER) — AC unmet (more than one new line)"
  vars:
    task_id: "eval-fixture-fail-blocker"
    task_spec: |
      Add a one-line comment to src/utils.ts describing the function purpose.
      Acceptance criteria:
      - Exactly one new line in src/utils.ts.
      - No other files changed.
      - Comment starts with // and ends with a period.
    candidate_output: |
      diff --git a/src/utils.ts b/src/utils.ts
      --- a/src/utils.ts
      +++ b/src/utils.ts
      @@ -1,3 +1,6 @@
      +// Adds two numbers together and returns the result.
      +// TODO(me): make async
      +console.log("debug");
       export function add(a: number, b: number) {
         return a + b;
       }
    fixture_expected: |
      {"verdict":"FAIL","blocker_min":1}
  assert: []

