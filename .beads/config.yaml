# .beads/config.yaml
# Beads issue tracker configuration.
# Do not edit this file manually — use bd config commands or the setup wizard.

project:
  name: agent-forge-harness
  description: "Composable agentic coding system"

sync:
  branch: beads-sync
  require_confirmation_on_mass_delete: true
  auto_sync_on_session_start: true
  auto_sync_on_session_end: true

events:
  export: true
  export_path: .beads/events.jsonl

repos:
  primary: "."
  # sub-repos: add paths as repos are registered
  # - path: "./repos/my-api"
  #   name: my-api

templates:
  epic: .beads/templates/beads_epic_requirements.md
  feature: .beads/templates/beads_feature_requirements.md
  task_graph: .beads/templates/tasks.prompt.md

defaults:
  priority: medium
  assignee: null

dolt.shared-server: true