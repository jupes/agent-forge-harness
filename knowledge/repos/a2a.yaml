overview:
  name: a2a
  description: >
    Google's Agent2Agent (A2A) open protocol: interoperability between opaque agentic
    applications (discovery, modalities, long-running collaboration without exposing
    internal state). This repo holds the specification, docs, ADRs, and tooling—not a
    single application server.
  purpose: library
  upstream: https://github.com/google/A2A
  tech_stack:
    runtime: python
    framework: mkdocs
    language: protobuf
    key_libraries:
      - buf: Protocol Buffers build / lint (see specification/)
      - a2a-sdk: Published Python SDK (see README badges)

harness_integration:
