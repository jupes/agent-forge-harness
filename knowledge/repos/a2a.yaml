overview:
  name: a2a
  description: >
    Agent2Agent (A2A) is an open protocol (Linux Foundation–hosted docs at a2a-protocol.org)
    for opaque agentic apps to discover each other, negotiate modalities, and collaborate on
    long-running work without exposing memory/tools. This repository is the specification,
    generated JSON schema, MkDocs site, ADRs, and maintenance scripts—not a runnable agent host.
  purpose: library
  upstream: https://github.com/google/A2A
  tech_stack:
    runtime: python
    framework: mkdocs-material
    language: protobuf
    key_libraries:
      - buf (v2): specification/buf.yaml — lint/breaking against googleapis deps
      - a2a-sdk: PyPI package (see README); tutorials under docs/tutorials/python/
      - uv: doc venv and pip installs per CONTRIBUTING.md

