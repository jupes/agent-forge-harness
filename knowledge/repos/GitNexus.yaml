overview:
  name: GitNexus
  description: >
    Monorepo that indexes codebases into a knowledge graph (dependencies, call chains, routes, tools, communities)
    and exposes it to AI agents via MCP (stdio), CLI commands, and an optional HTTP bridge for the React/Vite web UI.
    Uses LadybugDB for persistence locally; README positions CLI+MCP as primary and browser UI for exploration.
    Published CLI package version at indexed clone: 1.6.3 (see gitnexus/package.json).
  purpose: tooling
  upstream: https://github.com/abhigyanpatwari/GitNexus
  agent_walkthrough: knowledge/walkthroughs/gitnexus.md
  tech_stack:
    runtime: node
    framework: express (HTTP bridge in CLI package); vite + react (gitnexus-web)
    language: typescript
    key_libraries:
      - LadybugDB (@ladybugdb/core) — graph storage and queries
      - Tree-sitter — multi-language parsing (native CLI vs WASM in browser path per README)
      - Vitest — tests in gitnexus package (see TESTING.md)
      - Model Context Protocol — agent tool surface (`gitnexus` MCP server)

architecture:
  structure: |
    gitnexus/                  npm package `gitnexus`: CLI, MCP, ingestion pipeline, graph schema, embeddings
    gitnexus-web/              Vite + React client; talks to `gitnexus serve` HTTP API
    gitnexus-shared/           Shared TS types/constants (languages, etc.)
    gitnexus-claude-plugin/, gitnexus-cursor-integration/, .claude/ — editor/agent integrations and skills
    eval/                      Benchmark/evaluation harnesses
    docs/, deploy/, docker*    Docs and container/deploy assets
  entry_points:
    - gitnexus/dist/cli/index.js — `gitnexus` binary (`analyze`, `setup`, `serve`, `query`, …)
    - gitnexus/src/mcp/* — MCP server wiring (tools/resources per ARCHITECTURE.md)
    - gitnexus/src/cli/serve.ts + HTTP API — bridge for web UI
    - gitnexus-web/src/ — graph explorer + chat UI
  key_components:
    - Ingestion DAG — 12 phases (scan → parse → routes/tools/orm → cross-file → MRO → communities → processes); see ARCHITECTURE.md
    - Query layer — hybrid BM25 + vector search, Cypher, impact/context tools for agents
    - Multi-repo groups — `@group` routing, contract registry resources (`gitnexus://group/...`)
    - Registry — `~/.gitnexus/registry.json` for MCP repo discovery (per ARCHITECTURE.md)

patterns:
  error_handling: >
    CLI and server layers surface failures through typed flows; RUNBOOK.md documents operational recovery (stale index, MCP).
  state_management: >
    Indexed graph persisted under `.gitnexus/` per repo; staleness compared via indexed commit vs HEAD (`staleness.ts`).
  module_organization: >
    Domain logic under `gitnexus/src/core/` (ingestion, lbug, search, embeddings, group); MCP under `gitnexus/src/mcp/`.
  authentication: >
    Local-first CLI; web/cloud deployments vary—see deploy/docker docs for server modes.
  testing: >
    Vitest split unit/integration in `gitnexus`; monorepo lint via ESLint + Prettier + husky (root package.json).

conventions:
  commit_format: >
    Conventional commits enforced on PR titles (see CONTRIBUTING.md matrix: feat/fix/perf/ci/deps/docs/chore…).
  branch_naming: Short-lived branches off default branch for upstream PRs
  pr_requirements:
    - PR title matches conventional-commit pattern (labeler)
    - Describe what/why/verification and risks per CONTRIBUTING.md
    - License: PolyForm Noncommercial 1.0.0 for contributions
  coding_standards:
    - TypeScript ESM in `gitnexus`
    - GUARDRAILS.md for agent/contributor safety expectations

integration_points:
  apis:
    - notes: HTTP API owned by CLI `serve` path for web UI and bridge mode; exact routes implemented in gitnexus Express layer
      method: HTTP
      endpoint: (see gitnexus serve / ARCHITECTURE.md references to api.ts, mcp-http.ts)
      request: JSON per route
      response: Application-specific envelopes for graph/chat operations
  mcp_tools_summary: >
    MCP exposes graph search (hybrid BM25 + vector), Cypher, context (callers/callees), impact/blast radius,
    change detection, rename with dry_run, API/route maps, tool maps, shape checks, and group-scoped resources;
    authoritative names and parameters live in ARCHITECTURE.md § MCP tools (avoid duplicating here).
  shared_types:
    - name: Language IDs / shared graph constants
      file: gitnexus-shared/src/
      consumers: [gitnexus, gitnexus-web]
  events:
    - name: MCP tool invocations
      producer: Agent hosts (Cursor, Claude Code, etc.)
      consumer: gitnexus MCP server
      payload: Tool arguments per MCP schema (query, context, impact, cypher, …)

key_files:
  - path: README.md
    description: Product positioning, install (`npx gitnexus analyze`), MCP setup, web vs CLI comparison, enterprise note.
  - path: ARCHITECTURE.md
    description: Monorepo map, index→graph→tools flow, MCP tool table, pipeline phase DAG, file pointers for changes.
  - path: RUNBOOK.md
    description: Operational recipes (analyze, embeddings, recovery).
  - path: GUARDRAILS.md
    description: Contributor/agent safety rules and operational signs.
  - path: CONTRIBUTING.md
    description: Setup (`cd gitnexus && npm install && npm run build`), PR title rules, license.
  - path: TESTING.md
    description: How to run gitnexus and gitnexus-web tests.
  - path: gitnexus/package.json
    description: Published `gitnexus` package metadata, scripts, bin entry.
  - path: gitnexus/src/mcp/tools.ts
    description: MCP tool registrations (implementations delegate to LocalBackend); pair with ARCHITECTURE.md table.

harness_integration:
  registry_entry: repos/repos.json — name "GitNexus", defaultBranch main (local; gitignored)
  clone: Public HTTPS (query string on URL ignored); `bun run repo init --repo GitNexus --human`
  local_path: repos/GitNexus
  walkthrough: knowledge/walkthroughs/gitnexus.md

