overview:
  name: modelcontextprotocol
  description: >
    The Model Context Protocol (MCP) specification, protocol schema, and official
    documentation. The schema is authored in TypeScript as the source of truth and
    compiled to JSON Schema for wider compatibility; the docs site is built with
    Mintlify and published at modelcontextprotocol.io.
  purpose: specification-and-docs
  tech_stack:
    runtime: node
    framework: mintlify (docs), hugo (blog)
    language: typescript
    key_libraries:
      - typescript: "^6.0.2" — schema source language and type checking
      - tsx: "^4.21.0" — TS runner for build/check scripts
      - typescript-json-schema: "^0.67.1" — TS → JSON Schema generation (via npx)
      - ajv: "^8.18.0" — JSON Schema validation for examples
      - ajv-formats: "^3.0.1" — format validators for AJV
      - typedoc: "^0.28.19" — generates schema MDX reference
      - eslint: "^10.2.0" — linting (with typescript-eslint ^8.58.1)
      - prettier: "^3.8.2" — formatting
      - unified / remark-parse / remark-mdx — MDX tooling
      - cheerio — HTML parsing in docs scripts

architecture:
  structure: |
    schema/           Versioned protocol schemas (TS is source of truth)
      draft/          Ongoing schema edits land here
      2024-11-05/     Past spec versions
      2025-03-26/
      2025-06-18/
      2025-11-25/     Current published version (schema.ts, schema.json, examples/)
    docs/             Mintlify documentation site
      docs/           Guides and how-tos
      specification/  Versioned spec pages (includes generated schema.mdx)
      community/      Community docs (e.g. sep-guidelines.mdx)
      seps/           Generated SEP pages
    seps/             SEP (Specification Enhancement Proposal) source markdown
    scripts/          Build/validation scripts (generate-schemas, validate-examples,
                      render-seps, check-mdx-comments)
    blog/             Hugo-based MCP blog
    tools/sep-automation/  SEP automation tooling
    .github/          Workflows and issue templates
  entry_points:
    - schema/<version>/schema.ts: canonical protocol types (e.g. JSONRPCMessage,
      LATEST_PROTOCOL_VERSION); edits normally happen in schema/draft/schema.ts
    - schema/<version>/schema.json: generated JSON Schema artifact consumed by SDKs
    - docs/docs.json: Mintlify site navigation/config root
    - scripts/generate-schemas.ts: runs typescript-json-schema over versioned TS
    - scripts/validate-examples.ts: AJV-validates schema/<version>/examples/**
    - scripts/render-seps.ts: renders seps/*.md into docs/seps/
  key_components:
    - schema source: schema/draft/schema.ts — where in-flight protocol changes live
    - current schema: schema/2025-11-25/schema.ts — latest published protocol
    - schema generation: scripts/generate-schemas.ts — applies draft-07 vs 2020-12
      JSON Schema rules per version (LEGACY_SCHEMAS vs MODERN_SCHEMAS)
    - example validation: scripts/validate-examples.ts — returns string arrays of
      errors per example; parse failures become a single error string
    - SEP rendering: scripts/render-seps.ts — produces docs/seps/ from seps/*.md
    - docs site: docs/ — Mintlify; served via `npm run serve:docs`

patterns:
  error_handling: >
    Tooling-only repo — no application runtime. Scripts use try/catch, write
    human-readable messages to stderr via console.error, and exit with
    process.exit(1) on check failures. Top-level main() calls end with .catch
    handlers. validate-examples.ts returns arrays of error strings (parse failures
    collapse to a single error entry) so callers can aggregate results.
  state_management: >
    Not applicable — static schema/docs repo. The closest analog is
    "schema-first, TypeScript is source of truth": edit TS, regenerate JSON
    Schema and schema.mdx, commit all three together.
  module_organization: >
    Date-based versioning for the spec (YYYY-MM-DD directories plus draft/).
    Each version directory colocates schema.ts, generated schema.json, a
    schema.mdx template, and per-type examples under examples/<TypeName>/.
    Docs are grouped by audience (docs/, specification/, community/) with the
    Mintlify nav defined in docs/docs.json. SEPs live as flat markdown in seps/
    with filenames tied to their PR numbers (0000- placeholder before merge).
  authentication: >
    Not applicable.
  testing: >
    No unit test framework. Quality is enforced by the check pipeline
    (`npm run check`, `npm run prep`): tsc + eslint + prettier over schema TS,
    generate-schemas --check (no drift), validate-examples (AJV), Typedoc vs
    committed schema.mdx, Mintlify broken-links, and render-seps --check.

conventions:
  commit_format: "<type>(<scope>): <description> (#<pr>)"
  branch_naming: "users/<author>/<topic> or claude/<topic> — conventional"
  pr_requirements:
    - Fork-and-PR workflow; maintainers review
    - Node.js 24+ for spec work (engines requires >=20)
    - Schema changes land in schema/draft/schema.ts, then regenerate
    - Run `npm run check:schema:ts` and `npm run generate:schema` before pushing
    - Run `npm run prep` for docs changes (full generate + check pipeline)
    - Disclose AI assistance in PR/issue descriptions
    - No model names in commit messages
    - Use issue templates
  coding_standards:
    - TypeScript strict (tsc --noEmit in check:schema:ts)
    - ESLint + typescript-eslint
    - Prettier-formatted; .prettierrc.json at repo root
    - Generated artifacts committed alongside their TS sources

integration_points:
  apis:
    - endpoint: schema/<version>/schema.json
      method: artifact
      request: N/A
      response: JSON Schema (draft-07 for LEGACY_SCHEMAS, 2020-12 for MODERN_SCHEMAS)
      notes: Consumed by MCP SDKs and clients across the ecosystem
    - endpoint: docs/specification/<version>/schema.mdx
      method: artifact
      request: N/A
      response: Published schema reference (generated from TS via Typedoc)
      notes: Kept in sync via `check:schema:md`
  shared_types:
    - name: JSONRPCMessage
      file: schema/<version>/schema.ts
      consumers: [mcp-sdks, mcp-clients, mcp-servers]
    - name: LATEST_PROTOCOL_VERSION
      file: schema/<version>/schema.ts
      consumers: [mcp-sdks]
  events:
    - name: SEP lifecycle
      producer: seps/<nnnn>-<title>.md (PR)
      consumer: docs/seps/ (rendered) and Mintlify site
      payload: Standards Track | Informational | Process proposal

