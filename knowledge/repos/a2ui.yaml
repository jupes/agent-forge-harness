overview:
  name: a2ui
  description: >
    A2UI (Agent-to-User Interface) is an open format plus reference renderers so agents emit
    declarative JSON (“A2UI Response”) and trusted host apps map abstract components to native
    widgets (Lit, React, Angular, Flutter, markdown-it, etc.). Public preview (~v0.8–v0.10 spec
    dirs); same JSON can target multiple clients. Transports include A2A / AG UI per README.
  purpose: library
  upstream: https://github.com/google/A2UI
  tech_stack:
    runtime: node
    framework: multi-package monorepo (npm workspaces pattern under renderers/)
    language: typescript
    key_libraries:
      - "@a2ui/web_core": "0.9.1-alpha.0" — shared web core (renderers/web_core/package.json)
      - "@a2ui/lit": "0.9.2-alpha.0" — Lit renderer + versioned exports ./v0_8, ./v0_9
      - Python agent samples: agent_sdks/python, uv in samples (see README restaurant flow)
      - mkdocs.yaml: Project documentation site

