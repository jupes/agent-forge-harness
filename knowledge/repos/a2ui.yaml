patterns:
  error_handling: >
    Host validates payloads and maps types to sandboxed components; LLM output is data-only.
  state_management: >
    Flat component lists with stable IDs for incremental updates (README “LLM-friendly”).
  module_organization: >
    Spec major versions in sibling directories; each renderer is its own package with own
    package.json; agent_sdks split by language.
  authentication: >
    Trust boundaries live in host catalog + optional iframe/smart-wrapper patterns (README).
  testing: >
    Renderer packages use framework tests (Jest/Vitest/Karma per package); run per-package
    npm test after install. Do not run `bun test` from harness root against this tree—use
    package-local npm scripts. STYLE_GUIDE.md covers Python + TypeScript for contributions.

