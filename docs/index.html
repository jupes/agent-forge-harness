<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Forge — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Warm “forge ledger” palette — distinct from default GitHub-dark / generic SaaS */
      --bg: #100e0b;
      --bg-elevated: #16130f;
      --surface: #1c1915;
      --surface-2: #252119;
      --border: #3a342c;
      --text: #ede8e1;
      --text-muted: #9c9488;
      --accent: #d4a574;
      --accent-hover: #e0b78a;
      --accent-2: #7cb896;
      --accent-3: #b89fd4;
      --accent-4: #e07a5f;
      --glow-brass: rgba(212, 165, 116, 0.14);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      font-optical-sizing: auto;
      background:
        radial-gradient(120% 70% at 0% 0%, rgba(212, 165, 116, 0.09), transparent 55%),
        radial-gradient(80% 50% at 100% 10%, rgba(124, 184, 150, 0.06), transparent 45%),
        var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-size: 15px;
      min-height: 100vh;
    }

    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 220px;
      height: 100vh;
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg-elevated) 100%);
      border-right: 1px solid var(--border);
      box-shadow: inset -1px 0 0 rgba(212, 165, 116, 0.06);
      overflow-y: auto;
      z-index: 100;
      padding: 1.25rem 0 1rem;
    }

    nav .nav-title {
      padding: 0 1.25rem 1rem;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 1.35rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1.2;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }

    nav a {
      display: block;
      padding: 0.4rem 1.25rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      border-left: 3px solid transparent;
      transition: all 0.1s;
    }

    nav a:hover, nav a.active {
      color: var(--text);
      background: var(--surface-2);
      border-left-color: var(--accent-2);
    }

    nav .nav-meta {
      padding: 1rem 1.25rem 0;
      border-top: 1px solid var(--border);
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Main */
    main {
      margin-left: 220px;
      padding: 2rem 2.5rem 4rem;
      max-width: 1100px;
    }

    .page-header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 1.85rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    /* Stat cards */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      text-align: center;
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
    }

    .stat-num {
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.75rem 0 1.5rem;
      font-size: 0.875rem;
    }

    th {
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      text-align: left;
      padding: 0.65rem 1rem;
      border-bottom: 2px solid var(--border);
    }

    td {
      padding: 0.55rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
    }

    tr:hover td { color: var(--text); background: var(--surface); }

    /* Type column: keep icon + word on one line, comfortable spacing */
    .issue-table th.type-col,
    .issue-table td.type-col {
      min-width: 6.5rem;
      width: 1%;
      white-space: nowrap;
      vertical-align: middle;
      padding-left: 0.75rem;
      padding-right: 1rem;
    }

    .type-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
      line-height: 1.25;
    }

    .type-pill .type-icon {
      flex-shrink: 0;
      line-height: 1;
      font-size: 1.05em;
    }

    .type-pill .type-label {
      color: var(--text-muted);
    }

    tr:hover td.type-col .type-label {
      color: var(--text);
    }

    /* All Issues — expandable detail row */
    .issue-summary-row {
      cursor: pointer;
    }

    .issue-summary-row:focus-visible {
      outline: 2px solid var(--accent-2);
      outline-offset: -2px;
    }

    .issue-table-expandable tr.issue-detail-gap td {
      padding: 0;
      vertical-align: top;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .issue-table-expandable tr.issue-detail-gap:hover td {
      background: var(--bg);
      color: var(--text-muted);
    }

    .issue-detail-anim {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.35s ease;
    }

    .issue-detail-anim.is-open {
      grid-template-rows: 1fr;
    }

    .issue-detail-anim-inner {
      min-height: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .issue-detail-panel {
      pointer-events: auto;
      padding: 0.9rem 1.1rem 1.15rem;
      background: var(--surface-2);
      border-top: 1px solid var(--border);
    }

    .issue-detail-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.65rem;
    }

    .issue-detail-heading {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }

    .issue-detail-close {
      flex-shrink: 0;
      width: 2rem;
      height: 2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      line-height: 1;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
    }

    .issue-detail-close:hover {
      color: var(--text);
      border-color: var(--accent);
      background: var(--surface);
    }

    .issue-detail-close:focus-visible {
      outline: 2px solid var(--accent-2);
      outline-offset: 2px;
    }

    .issue-detail-dl-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .issue-detail-kv {
      display: grid;
      grid-template-columns: minmax(7rem, 10rem) 1fr;
      gap: 0.35rem 0.85rem;
      font-size: 0.8125rem;
      align-items: start;
    }

    .issue-detail-kv dt {
      margin: 0;
      color: var(--text-muted);
      font-weight: 500;
    }

    .issue-detail-kv dd {
      margin: 0;
      color: var(--text);
    }

    .issue-detail-prose {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .issue-detail-section {
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .issue-detail-section h5 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin: 0 0 0.5rem;
    }

    .issue-detail-ac {
      margin: 0;
      padding-left: 1.1rem;
      color: var(--text);
    }

    .issue-detail-comments,
    .issue-detail-deps {
      margin: 0;
      padding-left: 1rem;
      list-style: disc;
      color: var(--text);
    }

    .issue-detail-comments li,
    .issue-detail-deps li {
      margin-bottom: 0.5rem;
    }

    .issue-detail-meta {
      display: block;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
    }

    .issue-detail-comment-body {
      margin: 0;
      font-family: inherit;
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }

    .issue-detail-dep-rel {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .issue-detail-dep-type {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    code {
      font-family: "SF Mono", "Cascadia Code", "Fira Code", ui-monospace, monospace;
      font-size: 0.82em;
      background: var(--surface-2);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      color: var(--accent);
      border: 1px solid rgba(58, 52, 44, 0.9);
    }

    h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin: 1.5rem 0 0.75rem;
    }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
    }

    /* Filters */
    .filter-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      align-items: center;
    }

    /* Epic cards */
    .epic-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .epic-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .epic-header .issue-id-copy {
      flex-shrink: 0;
    }

    /* ID column: keep long Beads ids on one line (avoid awkward mid-id wraps) */
    .issue-table th:first-child,
    .issue-table td:first-child {
      white-space: nowrap;
      width: 1%;
      vertical-align: middle;
    }

    /* Copy issue ID (tables, detail panel, epic header) */
    button.issue-id-copy {
      appearance: none;
      background: transparent;
      border: none;
      padding: 0.2rem 0.45rem;
      margin: -0.1rem 0;
      cursor: pointer;
      border-radius: 6px;
      font: inherit;
      color: inherit;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
      max-width: none;
    }

    button.issue-id-copy:hover {
      background: var(--glow-brass);
      color: var(--text);
    }

    button.issue-id-copy:focus-visible {
      outline: 2px solid var(--accent-2);
      outline-offset: 2px;
    }

    button.issue-id-copy code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.88em;
      color: var(--accent);
      white-space: nowrap;
    }

    #copy-toast {
      position: fixed;
      bottom: 1.35rem;
      left: 50%;
      z-index: 10000;
      max-width: min(90vw, 28rem);
      padding: 0.75rem 1.15rem;
      border-radius: 10px;
      background: var(--surface-2);
      border: 1px solid var(--accent-2);
      color: var(--text);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
      font-size: 0.9rem;
      text-align: center;
      pointer-events: none;
      transform: translateX(-50%) translateY(140%);
      opacity: 0;
      transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.22s ease;
    }

    #copy-toast.is-visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .progress-bar-bg {
      height: 6px;
      background: var(--surface-2);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-state p { margin-bottom: 0.5rem; }

    /* Responsive */
    @media (max-width: 800px) {
      nav { display: none; }
      main { margin-left: 0; padding: 1.5rem; }
      .stat-row { grid-template-columns: repeat(2, 1fr); }
    }

    html { scroll-behavior: smooth; }

    .nav-meta .rebuild-btn {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.45rem 0.6rem;
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
    }
    .nav-meta .rebuild-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }
    .nav-meta .rebuild-btn:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    /* Skill builder */
    .skill-form-card {
      max-width: 36rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 1.5rem 1.35rem;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22);
    }

    .skill-form .sb-field {
      margin-bottom: 1.1rem;
    }

    .skill-form label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    .sb-req { color: var(--accent-4); }

    .skill-form input[type="text"],
    .skill-form textarea {
      width: 100%;
      padding: 0.55rem 0.75rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .skill-form input:focus,
    .skill-form textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow-brass);
    }

    .sb-hint {
      display: block;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    .sb-actions {
      margin-top: 1.35rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.65rem 0.75rem;
    }

    .sb-clear {
      padding: 0.55rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .sb-clear:hover {
      color: var(--text);
      border-color: var(--text-muted);
      background: var(--surface-2);
    }

    .sb-actions .sb-submit {
      margin-left: auto;
    }

    .sb-submit {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.65rem 1.35rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: #1a1510;
      background: linear-gradient(135deg, var(--accent-hover) 0%, var(--accent) 55%, #b8895a 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 16px rgba(212, 165, 116, 0.28);
    }

    .sb-submit:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(212, 165, 116, 0.38);
    }

    .sb-submit:disabled {
      opacity: 0.85;
      cursor: wait;
      transform: none;
    }

    .sb-submit-spinner {
      display: none;
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(26, 21, 16, 0.25);
      border-top-color: #1a1510;
      border-radius: 50%;
      animation: sb-spin 0.65s linear infinite;
    }

    .sb-submit:disabled .sb-submit-label { opacity: 0.9; }
    .sb-submit:disabled .sb-submit-spinner { display: block; }

    @keyframes sb-spin {
      to { transform: rotate(360deg); }
    }

    .skill-form.is-submitting {
      pointer-events: none;
      animation: sb-form-glow 0.55s ease-out forwards;
    }

    @keyframes sb-form-glow {
      0% {
        box-shadow: 0 0 0 0 rgba(63, 185, 80, 0);
        transform: scale(1);
      }
      40% {
        box-shadow: 0 0 0 10px rgba(63, 185, 80, 0.12);
        transform: scale(1.01);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(63, 185, 80, 0);
        transform: scale(1);
      }
    }

    .skill-form-card.is-success-flash {
      animation: sb-card-success 0.7s ease-out;
    }

    @keyframes sb-card-success {
      0% { border-color: var(--border); }
      35% { border-color: var(--accent-2); box-shadow: 0 0 0 2px rgba(63, 185, 80, 0.25); }
      100% { border-color: var(--border); box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22); }
    }

    .sb-modal {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.25s ease, visibility 0.25s;
    }

    .sb-modal.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .sb-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(1, 4, 9, 0.72);
      backdrop-filter: blur(4px);
    }

    .sb-modal-panel {
      position: relative;
      max-width: 26rem;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 1.5rem 1.25rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      transform: scale(0.94) translateY(12px);
      opacity: 0;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.28s ease;
    }

    .sb-modal.is-open .sb-modal-panel {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .sb-modal-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 0 0 0.65rem;
      color: var(--accent-2);
    }

    .sb-modal-body {
      margin: 0 0 0.75rem;
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.55;
    }

    .sb-modal-hint {
      margin: 0 0 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .sb-modal-fallback label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    .sb-modal-fallback textarea {
      width: 100%;
      margin-bottom: 1rem;
      padding: 0.5rem 0.65rem;
      font-size: 0.75rem;
      font-family: ui-monospace, monospace;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      resize: vertical;
    }

    .sb-modal-close {
      width: 100%;
      padding: 0.55rem;
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .sb-modal-close:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-title">Agent Forge</div>
  <a href="#" data-view="dashboard" class="active">Dashboard</a>
  <a href="#" data-view="list">All Issues</a>
  <a href="#" data-view="epics">Epics</a>
  <a href="#" data-view="commands">Commands</a>
  <a href="#" data-view="skill-builder">Skill builder</a>
  <div class="nav-meta">
    <div>Live reload: <code>bun run dashboard</code> (Vite).</div>
    <button type="button" id="btn-rebuild-pages" class="rebuild-btn" title="Runs build-pages (works with Vite dev server only)">Rebuild data</button>
    <div style="margin-top:0.35rem;font-size:0.75rem;color:var(--text-muted)">CLI: <code>bun run build-pages</code></div>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1 id="view-title">Dashboard</h1>
  </div>
  <div id="content">
    <div class="empty-state">Loading...</div>
  </div>
</main>

<div id="copy-toast" role="status" aria-live="polite" aria-atomic="true" aria-hidden="true"></div>

<script type="module" src="js/app.mjs"></script>
</body>
</html>
