<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Forge — Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #1c2333;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-2: #3fb950;
      --accent-3: #d2a8ff;
      --accent-4: #f78166;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-size: 15px;
    }

    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 220px;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      z-index: 100;
      padding: 1.25rem 0 1rem;
    }

    nav .nav-title {
      padding: 0 1.25rem 1rem;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }

    nav a {
      display: block;
      padding: 0.4rem 1.25rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      border-left: 3px solid transparent;
      transition: all 0.1s;
    }

    nav a:hover, nav a.active {
      color: var(--text);
      background: var(--surface-2);
      border-left-color: var(--accent);
    }

    nav .nav-meta {
      padding: 1rem 1.25rem 0;
      border-top: 1px solid var(--border);
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Main */
    main {
      margin-left: 220px;
      padding: 2rem 2.5rem 4rem;
      max-width: 1100px;
    }

    .page-header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
    }

    /* Stat cards */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      text-align: center;
    }

    .stat-num {
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.75rem 0 1.5rem;
      font-size: 0.875rem;
    }

    th {
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      text-align: left;
      padding: 0.65rem 1rem;
      border-bottom: 2px solid var(--border);
    }

    td {
      padding: 0.55rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
    }

    tr:hover td { color: var(--text); background: var(--surface); }

    code {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.82em;
      background: var(--surface-2);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      color: #f0a500;
    }

    h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin: 1.5rem 0 0.75rem;
    }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
    }

    /* Filters */
    .filter-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      align-items: center;
    }

    /* Epic cards */
    .epic-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .epic-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .progress-bar-bg {
      height: 6px;
      background: var(--surface-2);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent-2);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-state p { margin-bottom: 0.5rem; }

    /* Responsive */
    @media (max-width: 800px) {
      nav { display: none; }
      main { margin-left: 0; padding: 1.5rem; }
      .stat-row { grid-template-columns: repeat(2, 1fr); }
    }

    html { scroll-behavior: smooth; }

    .nav-meta .rebuild-btn {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.45rem 0.6rem;
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
    }
    .nav-meta .rebuild-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }
    .nav-meta .rebuild-btn:disabled {
      opacity: 0.6;
      cursor: wait;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-title">Agent Forge</div>
  <a href="#" data-view="dashboard" class="active">Dashboard</a>
  <a href="#" data-view="list">All Issues</a>
  <a href="#" data-view="epics">Epics</a>
  <a href="#" data-view="commands">Commands</a>
  <div class="nav-meta">
    <div>Live reload: <code>bun run dashboard</code> (Vite).</div>
    <button type="button" id="btn-rebuild-pages" class="rebuild-btn" title="Runs build-pages (works with Vite dev server only)">Rebuild data</button>
    <div style="margin-top:0.35rem;font-size:0.75rem;color:var(--text-muted)">CLI: <code>bun run build-pages</code></div>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1 id="view-title">Dashboard</h1>
  </div>
  <div id="content">
    <div class="empty-state">Loading...</div>
  </div>
</main>

<script src="js/app.js"></script>
</body>
</html>
